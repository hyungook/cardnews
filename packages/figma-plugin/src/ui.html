<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: sans-serif;
      background: #1a1a1a;
      color: #fff;
      font-size: 11px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-weight: 600;
      text-align: center;
    }
    .connected {
      background: #0a3a0c;
      color: #4ade80;
    }
    .disconnected {
      background: #3a0a0c;
      color: #f87171;
    }
    .log {
      font-size: 9px;
      color: #888;
      max-height: 80px;
      overflow-y: auto;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="status" class="status disconnected">🔴 연결 중...</div>
  <div class="log" id="log"></div>
  <script>
    const WS_URL = "ws://localhost:3000/ws";
    const RECONNECT_INTERVAL = 3000;
    let ws = null;
    let reconnectCount = 0;
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    function log(msg) {
      console.log(msg);
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML = "[" + time + "] " + msg + "<br>" + logEl.innerHTML;
    }

    function updateStatus(connected) {
      if (connected) {
        statusEl.className = "status connected";
        statusEl.textContent = "🟢 서버 연결됨";
        reconnectCount = 0;
      } else {
        statusEl.className = "status disconnected";
        statusEl.textContent = "🔴 연결 끊김 (재시도: " + reconnectCount + ")";
      }
    }

    function connect() {
      reconnectCount++;
      log("WebSocket 연결 시도 #" + reconnectCount + "...");
      try {
        ws = new WebSocket(WS_URL);
        
        ws.onopen = function() {
          log("✅ WebSocket 연결 성공!");
          updateStatus(true);
        };
        
        ws.onmessage = function(event) {
          try {
            const msg = JSON.parse(event.data);
            log("📥 서버 → 샌드박스: " + msg.command);
            parent.postMessage({ pluginMessage: msg }, "*");
          } catch (err) {
            log("❌ 메시지 파싱 실패: " + err.message);
          }
        };
        
        ws.onclose = function() {
          log("❌ WebSocket 연결 끊김. 3초 후 재연결...");
          updateStatus(false);
          ws = null;
          setTimeout(connect, RECONNECT_INTERVAL);
        };
        
        ws.onerror = function(err) {
          log("❌ WebSocket 오류: " + (err.message || "알 수 없음"));
        };
      } catch (err) {
        log("❌ 연결 실패: " + err.message);
        setTimeout(connect, RECONNECT_INTERVAL);
      }
    }

    window.onmessage = function(event) {
      const pluginMessage = event.data && event.data.pluginMessage;
      if (!pluginMessage) return;
      
      log("📤 샌드박스 → 서버: " + pluginMessage.id);
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify(pluginMessage));
      } else {
        log("⚠️ WebSocket 미연결. 메시지 전송 실패");
      }
    };

    log("🚀 플러그인 UI 초기화 완료");
    connect();
  </script>
</body>
</html>
